<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jspractice</title>
</head>
<body>
    <h1>JS Practice</h1>
    <p id="para" style="display: none;">javascript started</p>
    <button id="button" type="button" style="display: block;" onclick="clickme();">Click me</button>
    <script>
        function clickme(){
            document.getElementById("para").style.display="block";
            document.getElementById("button").style.display="none";
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
